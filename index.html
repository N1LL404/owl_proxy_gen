  { name: "U.S. Virgin Islands",  code: "VI", flag: "🇻🇮" },
  { name: "Vietnam",              code: "VN", flag: "🇻🇳" },
  { name: "Kosovo",               code: "XK", flag: "🇽🇰" },
  { name: "South Africa",         code: "ZA", flag: "🇿🇦" },
  { name: "Zambia",               code: "ZM", flag: "🇿🇲" },
  { name: "Singapore",            code: "SG", flag: "🇸🇬" },
];

let generatedProxies = [];

function randSid() {
  return String(Math.floor(10000000 + Math.random() * 90000000));
}

function parseProxy(line) {
  line = line.trim();
  // Format: user:pass@host:port
  // user format: PREFIX_custom_zone_XX_st__city_sid_YYYYYYYY_time_Z
  const atIdx = line.lastIndexOf('@');
  if (atIdx === -1) return null;

  const userPass = line.substring(0, atIdx);
  const hostPort = line.substring(atIdx + 1);

  const colonIdx = userPass.indexOf(':');
  if (colonIdx === -1) return null;

  const user = userPass.substring(0, colonIdx);
  const pass = userPass.substring(colonIdx + 1);

  // Parse user: find _zone_ and _st_
  const zoneMatch = user.match(/^(.+_custom_zone_)([A-Z]{2})(_st_.*_sid_)(\d+)(_time_.+)$/);
  if (!zoneMatch) return null;

  return {
    prefix: zoneMatch[1],     // everything up to and including _zone_
    zoneCode: zoneMatch[2],   // current 2-letter code
    middle: zoneMatch[3],     // _st__city_sid_
    sid: zoneMatch[4],         // 8-digit sid
    suffix: zoneMatch[5],     // _time_5
    pass,
    hostPort
  };
}

function buildProxy(parsed, countryCode) {
  return `${parsed.prefix}${countryCode}${parsed.middle}${randSid()}${parsed.suffix}:${parsed.pass}@${parsed.hostPort}`;
}

// Live parse preview
document.getElementById('proxyInput').addEventListener('input', function() {
  const preview = document.getElementById('parsePreview');
  const val = this.value.trim();
  if (!val) { preview.classList.remove('visible'); return; }

  const p = parseProxy(val);
  if (!p) { preview.classList.remove('visible'); return; }

  preview.innerHTML = `
    <span class="pk">prefix: </span><span class="pv">${escHtml(p.prefix)}</span><br>
    <span class="pk">zone: </span><span class="pz">${escHtml(p.zoneCode)}</span>
    &nbsp;&nbsp;<span class="pk">sid: </span><span class="ps">${escHtml(p.sid)}</span>
    &nbsp;&nbsp;<span class="pk">suffix: </span><span class="pv">${escHtml(p.suffix)}</span><br>
    <span class="pk">pass: </span><span class="pv">${escHtml(p.pass)}</span>
    &nbsp;&nbsp;<span class="pk">host: </span><span class="pv">${escHtml(p.hostPort)}</span>
  `;
  preview.classList.add('visible');
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

function generate() {
  hideError();
  const input = document.getElementById('proxyInput').value.trim();
  if (!input) { showError('Please paste a proxy line first.'); return; }

  const parsed = parseProxy(input);
  if (!parsed) {
    showError('Could not parse proxy format. Expected: user_custom_zone_XX_st__city_sid_XXXXXXXX_time_Y:pass@host:port');
    return;
  }

  generatedProxies = COUNTRIES.map(c => ({
    ...c,
    proxy: buildProxy(parsed, c.code)
  }));

  renderList(generatedProxies);
  document.getElementById('outputSection').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('filterBar').style.display = 'flex';
  document.getElementById('filterInput').value = '';
  document.getElementById('countBadge').innerHTML = `<strong>${generatedProxies.length}</strong> proxies generated`;

  updateAllProxiesText(generatedProxies);
}

function renderList(list) {
  const container = document.getElementById('proxyList');
  container.innerHTML = '';
  list.forEach(item => {
    const div = document.createElement('div');
    div.className = 'proxy-item';
    div.dataset.proxy = item.proxy;
    div.innerHTML = `
      <span class="flag">${item.flag}</span>
      <span class="country-name">${escHtml(item.name)}</span>
      <span class="code-tag">${item.code}</span>
      <span class="proxy-str">${escHtml(item.proxy)}</span>
      <span class="copy-hint">COPY</span>
    `;
    div.addEventListener('click', function() {
      navigator.clipboard.writeText(this.dataset.proxy).then(() => {
        this.classList.add('copied');
        this.querySelector('.copy-hint').textContent = 'COPIED!';
        setTimeout(() => {
          this.classList.remove('copied');
          this.querySelector('.copy-hint').textContent = 'COPY';
        }, 1500);
      });
    });
    container.appendChild(div);
  });
  document.getElementById('visibleCount').textContent = `(${list.length})`;
}

function filterList() {
  const q = document.getElementById('filterInput').value.toLowerCase();
  const filtered = generatedProxies.filter(c =>
    c.name.toLowerCase().includes(q) || c.code.toLowerCase().includes(q)
  );
  renderList(filtered);
  updateAllProxiesText(filtered);
}

function updateAllProxiesText(list) {
  document.getElementById('allProxiesText').value = list.map(c => c.proxy).join('\n');
}

function copyAll() {
  if (!generatedProxies.length) { showError('Generate proxies first.'); return; }
  const q = document.getElementById('filterInput').value.toLowerCase();
  const list = q
    ? generatedProxies.filter(c => c.name.toLowerCase().includes(q) || c.code.toLowerCase().includes(q))
    : generatedProxies;
  const txt = list.map(c => c.proxy).join('\n');
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.querySelector('.btn-secondary');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied ' + list.length + ' proxies!';
    btn.style.borderColor = 'var(--success)';
    btn.style.color = 'var(--success)';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 2000);
  }).catch(() => {
    // Fallback: show textarea
    const area = document.getElementById('copyAllArea');
    area.classList.add('visible');
    const ta = document.getElementById('allProxiesText');
    ta.select();
  });
}

function copyTextarea() {
  const ta = document.getElementById('allProxiesText');
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = event.target;
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy to Clipboard', 1500);
  });
}

function downloadTxt() {
  if (!generatedProxies.length) { showError('Generate proxies first.'); return; }
  const txt = generatedProxies.map(c => c.proxy).join('\n');
  const blob = new Blob([txt], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'proxies_all_countries.txt';
  a.click();
}

function clearAll() {
  document.getElementById('proxyInput').value = '';
  document.getElementById('parsePreview').classList.remove('visible');
  document.getElementById('outputSection').style.display = 'none';
  document.getElementById('filterBar').style.display = 'none';
  document.getElementById('emptyState').style.display = 'block';
  document.getElementById('copyAllArea').classList.remove('visible');
  document.getElementById('countBadge').innerHTML = '';
  document.getElementById('proxyList').innerHTML = '';
  generatedProxies = [];
  hideError();
}
</script>
</body>
</html>
